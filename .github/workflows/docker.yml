name: Docker

on:
  workflow_dispatch:
  push:
    tags: ['v*']

# NOTE: do NOT add a top-level `permissions:` block. Combined with
# `secrets: inherit` on a cross-org `uses:` it triggers silent
# startup_failure on the reusable workflow. The reusable's job-level
# permissions are sufficient.

jobs:
  docker:
    uses: luxfi/.github/.github/workflows/docker.yml@main
    with:
      image: ghcr.io/luxfi/exchange
      platforms: linux/amd64
      # luxfi org's own ARC scale-set (hanzoai's hanzo-build-* labels
      # are not visible cross-org)
      runner-amd64: hanzo-build-linux-amd64
      runner-deploy: hanzo-build-linux-amd64
    secrets: inherit

  notify-universe:
    needs: docker
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: hanzo-build-linux-amd64
    permissions:
      contents: read
    steps:
      - uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.UNIVERSE_PAT }}
          repository: luxfi/universe
          event-type: image-published
          client-payload: |
            {
              "service": "exchange",
              "image": "ghcr.io/luxfi/exchange",
              "tag": "${{ github.ref_name }}",
              "sha": "${{ github.sha }}"
            }
