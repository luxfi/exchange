name: E2E Tests

on:
  push:
    branches: [main, dev, test]
  pull_request:
    branches: [main, dev, test]

concurrency:
  group: e2e-${{ github.sha }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: luxfi/exchange

jobs:
  e2e-critical:
    name: Critical Path E2E Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - uses: pnpm/action-setup@v4

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build web app
        run: cd apps/web && DISABLE_EXTRACTION=1 NODE_OPTIONS="--max-old-space-size=8192" pnpm exec vite build
        env:
          NODE_ENV: production
          DOCKER_BUILD: true

      - name: Start preview server
        run: |
          # Strip CSP meta tag — blocks localhost connections to external APIs
          sed -i 's/<meta http-equiv="Content-Security-Policy"[^>]*>//' apps/web/build/client/index.html
          cd apps/web && npx serve -s build/client -l 3000 &
          for i in {1..15}; do
            if curl -s -o /dev/null -w '%{http_code}' http://localhost:3000 2>/dev/null | grep -qE '^[23]'; then
              echo "Preview server ready on port 3000"
              exit 0
            fi
            sleep 2
          done
          echo "Preview server did not start"
          exit 1

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run critical e2e tests
        run: |
          npx playwright test \
            --config=playwright.config.ts \
            apps/web/e2e/advanced.spec.ts \
            apps/web/e2e/lux-explore.spec.ts \
            --grep "@critical" \
            --reporter=list \
            --retries=2
        env:
          BASE_URL: http://localhost:3000

      - name: Upload test results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-results
          path: apps/web/test-results/
          retention-days: 7

  e2e-full:
    name: Full E2E Suite
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - uses: pnpm/action-setup@v4

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build web app
        run: cd apps/web && DISABLE_EXTRACTION=1 NODE_OPTIONS="--max-old-space-size=8192" pnpm exec vite build
        env:
          NODE_ENV: production
          DOCKER_BUILD: true

      - name: Start preview server
        run: |
          # Strip CSP meta tag — blocks localhost connections to external APIs
          sed -i 's/<meta http-equiv="Content-Security-Policy"[^>]*>//' apps/web/build/client/index.html
          cd apps/web && npx serve -s build/client -l 3000 &
          for i in {1..15}; do
            if curl -s -o /dev/null -w '%{http_code}' http://localhost:3000 2>/dev/null | grep -qE '^[23]'; then
              echo "Preview server ready on port 3000"
              exit 0
            fi
            sleep 2
          done
          echo "Preview server did not start"
          exit 1

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run all e2e tests
        run: |
          npx playwright test \
            --config=playwright.config.ts \
            apps/web/e2e/ \
            --reporter=list \
            --retries=2
        env:
          BASE_URL: http://localhost:3000

      - name: Upload test results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-full-results
          path: apps/web/test-results/
          retention-days: 7

  # Gate: deployment cannot proceed if critical tests fail
  deploy-gate:
    name: Deploy Gate
    needs: [e2e-critical]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    steps:
      - name: Critical tests passed
        run: echo "All critical e2e tests passed. Deployment is allowed."
