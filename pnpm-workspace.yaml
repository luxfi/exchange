packages:
  - "apps/*"
  - "pkgs/*"
  - "config/*"

# All catalog entries are proper upstream semver (no `*-fork.1` slop).
# Web build aliases react-native packages to TypeScript stubs in
# apps/web/src/stubs/ and Vite resolves .native.tsx out of the graph,
# so web never pulls native module compilation. Mobile (apps/mobile)
# resolves these as real React Native packages.
catalog:
  react-native: "0.79.5"
  react-native-reanimated: "3.19.3"
  react-native-sortables: "1.7.1"
  react-native-svg: "15.13.0"
  "@react-native/gradle-plugin": "0.79.5"
  "@shopify/react-native-performance": "4.1.2"
  "@expo/config-plugins": "10.1.1"
  zod: "4.3.6"
  immer: "9.0.21"
  multiformats: "9.9.0"
