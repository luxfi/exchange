# Lefthook configuration optimized for performance
# https://github.com/evilmartians/lefthook/blob/master/docs/configuration.md

# Skip hooks in CI/rebase/merge
skip_output:
  - meta
  - summary

pre-commit:
  parallel: true
  commands:
    fast-checks:
      env:
        CI: "true"
        FORCE_COLOR: "0"
        NX_DAEMON: "false"
      run: |
        export TERM=dumb
        # Get changed packages and typecheck them directly (not dependents)
        CHANGED=$(git diff --cached --name-only | sed -n 's|^packages/\([^/]*\)/.*|@luxfi/\1|p; s|^apps/\([^/]*\)/.*|@luxfi/\1|p' | sort -u | paste -sd, -)
        if [ -n "$CHANGED" ]; then
          echo "Typechecking changed packages: $CHANGED"
          npx nx run-many -t typecheck --projects="$CHANGED" --output-style=stream
        else
          echo "No package files changed, skipping typecheck"
        fi

    git-secrets:
      run: |
        export TERM=dumb
        if command -v git-secrets &> /dev/null; then
          git-secrets --register-aws > /dev/null
          echo "Running git-secrets..."
          git-secrets --pre_commit_hook -- "$@"
        else
          echo "git-secrets not installed, skipping..."
        fi

    trufflehog:
      run: |
        export TERM=dumb
        if command -v trufflehog &> /dev/null; then
          trufflehog git file://. --since-commit HEAD --only-verified --fail
        else
          echo "trufflehog not installed, skipping..."
        fi

post-checkout:
  commands:
    generate-biome-config:
      files: git diff --name-only {1} {2}
      glob: "packages/biome-config/**"
      run: |
        echo "Biome config files changed, regenerating config..."
        bun biome-config prepare
