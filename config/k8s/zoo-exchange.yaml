# Zoo Exchange - White-label deployment
# Namespace: lux-exchange
# Domain: zoo.exchange
#
# Usage:
#   kubectl apply -f zoo-exchange.yaml
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: zoo-exchange-brand
  namespace: lux-exchange
  labels:
    app: exchange
    brand: zoo
data:
  brand.json: |
    {
      "brand": {
        "name": "Zoo Exchange",
        "title": "Zoo Exchange | Trade",
        "description": "The decentralized exchange for the Zoo ecosystem",
        "shortName": "ZOO",
        "labsName": "Zoo Labs",
        "legalEntity": "Zoo Labs Foundation",
        "walletName": "Zoo Wallet",
        "protocolName": "Zoo Protocol",
        "copyrightHolder": "Zoo Labs Foundation",
        "appDomain": "zoo.exchange",
        "docsDomain": "docs.zoo.exchange",
        "infoDomain": "info.zoo.exchange",
        "gatewayDomain": "gw.zoo.exchange",
        "wsDomain": "ws.zoo.exchange",
        "helpUrl": "https://docs.zoo.exchange/help",
        "termsUrl": "https://zoo.exchange/terms",
        "privacyUrl": "https://zoo.exchange/privacy",
        "downloadUrl": "https://zoo.exchange/wallet",
        "complianceEmail": "compliance@zoo.ngo",
        "supportEmail": "hi@zoo.ngo",
        "twitter": "https://x.com/zoo_ngo",
        "github": "https://github.com/zoo-labs",
        "discord": "https://discord.gg/zoo",
        "logoUrl": "/brands/zoo-logo.svg",
        "faviconUrl": "/brands/zoo-favicon.png",
        "primaryColor": "#000000",
        "theme": {
          "light": {
            "accent1": "#000000",
            "surface1": "#FFFFFF",
            "surface2": "#F9F9F9",
            "neutral1": "#131313",
            "neutral2": "rgba(19, 19, 19, 0.63)"
          },
          "dark": {
            "accent1": "#FFFFFF",
            "surface1": "#000000",
            "surface2": "#1A1A1A",
            "neutral1": "#FFFFFF",
            "neutral2": "rgba(255, 255, 255, 0.65)"
          }
        }
      },
      "chains": {
        "defaultChainId": 200200,
        "supported": [200200, 200201, 96369, 1, 42161, 8453, 137, 43114]
      },
      "rpc": {
        "200200": "https://api.zoo.network/ext/bc/C/rpc",
        "200201": "https://api.zoo-test.network/ext/bc/C/rpc",
        "96369": "https://api.lux.network/ext/bc/C/rpc",
        "1": "https://eth.llamarpc.com",
        "42161": "https://arb1.arbitrum.io/rpc",
        "8453": "https://mainnet.base.org",
        "137": "https://polygon-rpc.com",
        "43114": "https://api.avax.network/ext/bc/C/rpc"
      },
      "api": {
        "graphql": "https://api.zoo.exchange/v1/graphql",
        "gateway": "https://gw.zoo.exchange",
        "insights": "https://insights.hanzo.ai"
      },
      "iam": {
        "provider": "https://id.zoo.ngo",
        "clientId": "zoo-exchange"
      },
      "walletConnect": {
        "projectId": ""
      }
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: zoo-exchange
  namespace: lux-exchange
  labels:
    app: exchange
    brand: zoo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: exchange
      brand: zoo
  template:
    metadata:
      labels:
        app: exchange
        brand: zoo
    spec:
      containers:
        - name: exchange
          image: ghcr.io/luxfi/exchange:main
          ports:
            - containerPort: 3000
          volumeMounts:
            - name: brand-config
              mountPath: /app/public/brand.json
              subPath: brand.json
              readOnly: true
      volumes:
        - name: brand-config
          configMap:
            name: zoo-exchange-brand
---
apiVersion: v1
kind: Service
metadata:
  name: zoo-exchange
  namespace: lux-exchange
spec:
  selector:
    app: exchange
    brand: zoo
  ports:
    - port: 80
      targetPort: 3000
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: zoo-exchange
  namespace: lux-exchange
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  tls:
    - hosts:
        - zoo.exchange
      secretName: zoo-exchange-tls
  rules:
    - host: zoo.exchange
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: zoo-exchange
                port:
                  number: 80
