# Zoo Exchange
# Set BRAND_PACKAGE to any published @scope/brand package.
# The container fetches brand.json from jsdelivr at startup.
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: zoo-exchange
  namespace: lux-exchange
  labels:
    app: exchange
    brand: zoo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: exchange
      brand: zoo
  template:
    metadata:
      labels:
        app: exchange
        brand: zoo
    spec:
      containers:
        - name: exchange
          image: ghcr.io/luxfi/exchange:main
          ports:
            - containerPort: 3000
          env:
            - name: BRAND_PACKAGE
              value: "@zooai/brand"
---
apiVersion: v1
kind: Service
metadata:
  name: zoo-exchange
  namespace: lux-exchange
spec:
  selector:
    app: exchange
    brand: zoo
  ports:
    - port: 80
      targetPort: 3000
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: zoo-exchange
  namespace: lux-exchange
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  tls:
    - hosts:
        - zoo.exchange
      secretName: zoo-exchange-tls
  rules:
    - host: zoo.exchange
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: zoo-exchange
                port:
                  number: 80
