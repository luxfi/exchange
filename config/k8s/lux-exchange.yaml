# Lux Exchange (default brand — no BRAND_PACKAGE needed, uses baked-in brand.json)
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: lux-exchange
  namespace: lux-exchange
  labels:
    app: exchange
    brand: lux
spec:
  replicas: 1
  selector:
    matchLabels:
      app: exchange
      brand: lux
  template:
    metadata:
      labels:
        app: exchange
        brand: lux
    spec:
      containers:
        - name: exchange
          image: ghcr.io/luxfi/exchange:main
          ports:
            - containerPort: 3000
---
apiVersion: v1
kind: Service
metadata:
  name: lux-exchange
  namespace: lux-exchange
spec:
  selector:
    app: exchange
    brand: lux
  ports:
    - port: 80
      targetPort: 3000
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: lux-exchange
  namespace: lux-exchange
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  tls:
    - hosts:
        - lux.exchange
      secretName: lux-exchange-tls
  rules:
    - host: lux.exchange
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: lux-exchange
                port:
                  number: 80
